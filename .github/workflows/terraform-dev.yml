name: Terraform Dev Pipeline

on:
  push:
    paths:
      - 'envs/dev/**'

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: envs/dev
        run: terraform init

      - name: Terraform Plan
        working-directory: envs/dev
        run: terraform plan